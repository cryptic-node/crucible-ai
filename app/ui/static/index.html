<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grokenstein</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; color: #f0f6fc; font-weight: 600; }
    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .badge-high { background: #1a4731; color: #3fb950; border: 1px solid #3fb950; }
    .badge-medium { background: #3d2b00; color: #d29922; border: 1px solid #d29922; }
    .badge-low { background: #3d1a1a; color: #f85149; border: 1px solid #f85149; }
    .workspace-label { font-size: 0.8rem; color: #8b949e; margin-left: auto; }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 720px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user { background: #1f6feb22; border: 1px solid #1f6feb44; align-self: flex-end; }
    .message.assistant { background: #161b22; border: 1px solid #30363d; align-self: flex-start; }
    .message.system { color: #8b949e; font-size: 0.8rem; align-self: center; font-style: italic; }
    .message .label { font-size: 0.7rem; color: #8b949e; margin-bottom: 4px; font-weight: 600; }
    .tool-info {
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.78rem;
      color: #8b949e;
      margin-top: 6px;
    }
    .policy-deny { color: #f85149; }
    .policy-allow { color: #3fb950; }
    footer {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
    }
    textarea {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      height: 44px;
      min-height: 44px;
      max-height: 160px;
      line-height: 1.4;
    }
    textarea:focus { outline: none; border-color: #1f6feb; }
    button {
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0 18px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #388bfd; }
    button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    #config-panel {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    #config-panel label { font-size: 0.78rem; color: #8b949e; }
    #config-panel select, #config-panel input[type=text] {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.8rem;
    }
    #config-panel input[type=checkbox] { margin-right: 4px; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>&#x1F9DF; Grokenstein</h1>
    <span id="trust-badge" class="badge badge-high">HIGH</span>
    <span class="workspace-label">Workspace: <strong id="ws-name">personal</strong></span>
    <a href="/memory/personal" style="font-size:0.78rem; color:#8b949e; margin-left:12px;">Memory Review</a>
    <a href="/docs" style="font-size:0.78rem; color:#8b949e; margin-left:12px;">API Docs</a>
  </header>

  <div id="config-panel">
    <label>Workspace:
      <select id="workspace-select">
        <option value="personal">personal</option>
        <option value="consulting">consulting</option>
        <option value="experiments">experiments</option>
        <option value="infrastructure">infrastructure</option>
      </select>
    </label>
    <label>Trust:
      <select id="trust-select">
        <option value="HIGH">HIGH</option>
        <option value="MEDIUM">MEDIUM</option>
        <option value="LOW">LOW</option>
      </select>
    </label>
    <label>Channel:
      <select id="channel-select">
        <option value="web">web</option>
        <option value="cli">cli</option>
        <option value="local">local</option>
      </select>
    </label>
    <label><input type="checkbox" id="dry-run-toggle" /> Dry Run</label>
    <button id="new-session-btn" style="background:#21262d; color:#c9d1d9; font-size:0.78rem; padding:4px 12px;">New Session</button>
    <span id="session-id-label" style="font-size:0.72rem; color:#484f58;"></span>
  </div>

  <div id="chat-container">
    <div class="message system">Grokenstein v1.0.0 — security-first personal AI operator. Type a message to begin.</div>
  </div>

  <footer>
    <textarea id="input" placeholder="Message Grokenstein..." rows="1"></textarea>
    <button id="send-btn">Send</button>
  </footer>

  <script>
    const API_BASE = window.location.origin;
    let sessionId = null;

    const chatContainer = document.getElementById('chat-container');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const trustBadge = document.getElementById('trust-badge');
    const wsName = document.getElementById('ws-name');
    const sessionLabel = document.getElementById('session-id-label');

    function addMessage(role, text, extra) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = role === 'user' ? 'You' : role === 'assistant' ? 'Grokenstein' : '';
      if (label.textContent) div.appendChild(label);
      const body = document.createElement('div');
      body.textContent = text;
      div.appendChild(body);
      if (extra) {
        const info = document.createElement('div');
        info.className = 'tool-info';
        info.innerHTML = extra;
        div.appendChild(info);
      }
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function updateTrustBadge() {
      const trust = document.getElementById('trust-select').value;
      trustBadge.textContent = trust;
      trustBadge.className = 'badge badge-' + trust.toLowerCase();
    }

    document.getElementById('trust-select').addEventListener('change', updateTrustBadge);
    document.getElementById('workspace-select').addEventListener('change', () => {
      wsName.textContent = document.getElementById('workspace-select').value;
    });

    async function createSession() {
      const workspace = document.getElementById('workspace-select').value;
      const trust = document.getElementById('trust-select').value;
      const channel = document.getElementById('channel-select').value;
      const dryRun = document.getElementById('dry-run-toggle').checked;
      const res = await fetch(`${API_BASE}/sessions`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({workspace_id: workspace, trust_level: trust, channel, dry_run: dryRun}),
      });
      const data = await res.json();
      sessionId = data.session_id;
      sessionLabel.textContent = `Session: ${sessionId.slice(0, 8)}…`;
      addMessage('system', `New session started in workspace '${workspace}' [${trust}]${dryRun ? ' [DRY RUN]' : ''}`);
    }

    document.getElementById('new-session-btn').addEventListener('click', createSession);

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      inputEl.style.height = '44px';
      sendBtn.disabled = true;

      if (!sessionId) {
        await createSession();
      }

      addMessage('user', text);

      const dryRun = document.getElementById('dry-run-toggle').checked;
      try {
        const res = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({session_id: sessionId, message: text, dry_run: dryRun}),
        });
        const data = await res.json();
        let extra = null;
        if (data.tool_calls && data.tool_calls.length > 0) {
          extra = '<strong>Tool calls:</strong> ' + data.tool_calls.map(tc =>
            `<span class="${tc.success ? 'policy-allow' : 'policy-deny'}">${tc.tool_name}</span>`
          ).join(', ');
        }
        if (data.policy_decisions && data.policy_decisions.length > 0) {
          const pd = data.policy_decisions.map(d =>
            `<span class="${d.decision === 'allow' ? 'policy-allow' : 'policy-deny'}">${d.decision}</span>`
          ).join(', ');
          extra = (extra ? extra + ' | ' : '') + '<strong>Policy:</strong> ' + pd;
        }
        addMessage('assistant', data.reply || '[no reply]', extra);
      } catch (err) {
        addMessage('system', `Error: ${err.message}`);
      }
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = '44px';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    });

    createSession();
  </script>
</body>
</html>
